name: Auto-merge Cursor PRs

on:
  pull_request:
    types: [opened, reopened]

jobs:
  auto-merge:
    if: github.actor == 'cursor[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Mark PR ready
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr ready ${{ github.event.pull_request.number }} --repo ${{ github.repository }}

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --squash --admin
